name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff pyright --quiet

      - name: ruff (lint)
        run: ruff check src/ mcp_server.py

      - name: ruff (format)
        run: ruff format --check src/ mcp_server.py

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: alphashoop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --prefer-binary -r requirements.txt

      - name: Create DB tables
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/alphashoop_test
        run: |
          python -c "import asyncio; from src.db.engine import create_tables; asyncio.run(create_tables())"

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/alphashoop_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LITELLM_PROXY_URL: http://localhost:4000
          LITELLM_MASTER_KEY: ci-test-key
          SHOPIFY_STORE_DOMAIN: test.myshopify.com
          SHOPIFY_ACCESS_TOKEN: shpat_test
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Docker build ─────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docs image
        uses: docker/build-push-action@v5
        with:
          context: ./platform-app
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
