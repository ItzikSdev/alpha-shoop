services:

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alphashoop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alphashoop"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── LiteLLM Proxy ────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-alpha-shoop-local}
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-adc.json
      GOOGLE_CLOUD_PROJECT: alpha-shoop
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - ${HOME}/.config/gcloud/application_default_credentials.json:/app/gcp-adc.json:ro
    command: --config /app/config.yaml
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── FastAPI ───────────────────────────────────────────────────────────────
  api:
    image: alpha-shoop-api:prod
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false   # optional in CI where secrets come from GCP
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/alphashoop
      REDIS_URL: redis://redis:6379/0
      LITELLM_PROXY_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-alpha-shoop-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SHOPIFY_STORE_DOMAIN: ${SHOPIFY_STORE_DOMAIN:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      CJ_EMAIL: ${CJ_EMAIL:-}
      CJ_API_KEY: ${CJ_API_KEY:-}
    volumes:
      - traces_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy

  # ── React Docs (production build, nginx) ─────────────────────────────────
  docs:
    image: alpha-shoop-docs:prod
    build:
      context: ./docs-app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  postgres_data:
  traces_data:
