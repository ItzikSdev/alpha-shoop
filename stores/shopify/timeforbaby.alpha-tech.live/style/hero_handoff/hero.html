<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIMEFOR BABY — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="hero.css" />
</head>
<body>
  <section class="hero">
    <!-- Left: editorial copy panel -->
    <div class="hero__copy">
      <div class="hero__eyebrow">
        <span class="hero__eyebrow-rule"></span>
        <span>Organic cotton essentials</span>
      </div>

      <h1 class="hero__title">
        Soft. Modern.<br />
        <em>Made for first moments.</em>
      </h1>

      <p class="hero__subtitle">
        Thoughtfully designed baby essentials in premium organic cotton —
        gentle on the smallest skin, made to last.
      </p>

      <div class="hero__actions">
        <a href="#" class="hero__btn">
          Shop the collection
          <span aria-hidden="true">&rarr;</span>
        </a>
        <a href="#" class="hero__link">Our story</a>
      </div>

      <div class="hero__stats">
        <div class="hero__stat">
          <div class="hero__stat-num">100%</div>
          <div class="hero__stat-label">GOTS organic</div>
        </div>
        <div class="hero__stat-divider"></div>
        <div class="hero__stat">
          <div class="hero__stat-num">1,000+</div>
          <div class="hero__stat-label">Happy parents</div>
        </div>
      </div>
    </div>

    <!-- Right: image (replace .hero__media background with your photo) -->
    <div class="hero__media">
      <div class="hero__media-placeholder">
        <span>lifestyle photo &middot; mother + baby</span>
      </div>
      <div class="hero__media-fade"></div>
    </div>

    <!-- Carousel dots -->
    <div class="hero__dots">
      <span class="is-active"></span>
      <span></span>
      <span></span>
    </div>
  </section>
</body>
</html>
