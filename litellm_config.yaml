# LiteLLM Proxy — Alpha Shoop
#
# Start: make proxy
# URL:   http://localhost:4000
# Docs:  http://localhost:4000/ui
#
# All agents call this proxy via the OpenAI-compatible API.
# Model aliases decouple agent code from specific Claude model IDs.
#
# TEMPORARY: both tiers run on the direct Anthropic API right now.
# Vertex AI (GCP project alpha-shoop, region us-east5) is set up, but
# alpha/worker-smart needs Claude Sonnet 4.5 enabled first at
# https://console.cloud.google.com/vertex-ai/publishers/anthropic/model-garden?project=alpha-shoop
# alpha/worker-fast stays on direct Anthropic permanently — Haiku isn't
# available in this project's Vertex AI Model Garden at all (403, not just
# un-enabled).
#
# alpha/director (Opus 4.8, "most capable" tier) was removed — it backed
# src/agents/director.py's LLM-routing calls only, and that file was deleted
# when the pipeline was consolidated into src/agents/orchestrator.py's plain
# Python control flow. No code calls get_llm("director") anymore.

model_list:

  # ── Worker smart: balanced cost/quality (E-com + Marketing + Store Setup) ─
  - model_name: alpha/worker-smart
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192   # design_agent generates large CSS payloads (was 4096 — caused truncation/hangs)

  # ── Worker fast: cheapest, high volume (Scraper + Fulfillment) ───────────
  - model_name: alpha/worker-fast
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 2048

  # ── Local fast: FREE local model for the agent "company" layer ───────────
  # Used by the org's frequent/cheap calls (standups, onboarding, training)
  # via get_llm("standup"). Runs through Ollama on the host — no API cost.
  # Setup: `brew install ollama` → `ollama serve` → `ollama pull qwen2.5:7b`.
  # If Ollama isn't running, the org's meeting code degrades safely (0
  # decisions), so this never crashes the autonomous loop.
  - model_name: alpha/local-fast
    litellm_params:
      # Reaches Ollama on the HOST (same as local-coder below). The old
      # api_base http://ollama:11434 was a docker-service name that doesn't
      # resolve when Ollama runs natively on the host → every standup meeting +
      # the over-budget fallback failed with "Cannot connect to host ollama".
      # Model = qwen2.5-coder:14b (the one actually pulled). For a lighter 7B:
      # `ollama pull qwen2.5:7b` then set model back to ollama_chat/qwen2.5:7b.
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://host.docker.internal:11434
      max_tokens: 2048

  # ── Local CODER: stronger local model for the Developer agent (Grace) ────
  - model_name: alpha/local-coder
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://host.docker.internal:11434
      max_tokens: 4096

litellm_settings:
  drop_params: true          # ignore unsupported params (e.g. top_k) instead of erroring
  num_retries: 3             # retry transient Anthropic errors automatically
  request_timeout: 90        # seconds before a request is killed

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 90
  retry_after: 2             # seconds to wait before retry
  allowed_fails: 3           # mark a model unhealthy after this many failures

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # Bearer token agents must send
  store_model_in_db: false                     # disable LiteLLM's own DB (we use ours)
